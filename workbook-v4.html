<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CM 실전 워크북</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&family=EB+Garamond:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #111; --mid: #555; --light: #888;
    --line: #bbb; --fill: #f8f6f2;
    --acc: #7a2e1a; --gold: #a07828;
    --s2-size: 11.5px; --s2-gap: 10px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #fff; color: var(--ink);
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 11.5px; line-height: 1.6;
    padding: 12px 16px; max-width: 820px; margin: 0 auto;
  }

  /* INPUT SCREEN */
  .input-screen {
    min-height: 100vh; display: flex; flex-direction: column;
    justify-content: center; gap: 12px;
  }
  .input-title { font-size: 18px; font-weight: 700; color: var(--ink); border-bottom: 2px solid var(--ink); padding-bottom: 8px; margin-bottom: 4px; }
  .input-title small { font-size: 11px; font-weight: 400; color: var(--mid); margin-left: 8px; }
  .input-row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
  .input-label { font-size: 10px; font-weight: 700; color: var(--mid); letter-spacing: 0.06em; min-width: 60px; }
  .title-inp { flex: 1; border: 1px solid var(--line); border-radius: 4px; padding: 5px 10px; font-size: 12px; font-family: 'Noto Sans KR', sans-serif; outline: none; min-width: 200px; }
  .title-inp:focus { border-color: var(--acc); }
  .passage-inp { width: 100%; border: 1px solid var(--line); border-radius: 6px; padding: 10px 12px; font-size: 12px; font-family: 'EB Garamond', serif; line-height: 1.7; resize: vertical; min-height: 160px; outline: none; }
  .passage-inp:focus { border-color: var(--acc); }
  .level-chips { display: flex; gap: 6px; }
  .level-chip { border: 1px solid var(--line); border-radius: 4px; padding: 3px 12px; font-size: 10px; font-family: 'Noto Sans KR', sans-serif; cursor: pointer; color: var(--mid); background: none; transition: all 0.12s; }
  .level-chip.active { border-color: var(--acc); color: var(--acc); font-weight: 700; background: #fff5f3; }
  .gen-btn { width: 100%; padding: 10px; border: none; border-radius: 6px; background: var(--ink); color: #fff; font-size: 13px; font-weight: 700; font-family: 'Noto Sans KR', sans-serif; cursor: pointer; transition: all 0.15s; }
  .gen-btn:hover { background: var(--acc); }
  .gen-btn:disabled { background: #ccc; cursor: not-allowed; }

  /* LOADING */
  .loading { display: none; text-align: center; padding: 60px 0; }
  .loading.show { display: block; }
  .spinner { width: 36px; height: 36px; border: 3px solid var(--line); border-top-color: var(--acc); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-txt { font-size: 12px; color: var(--mid); }

  /* TOOLBAR */
  .toolbar { display: flex; gap: 6px; align-items: center; background: var(--fill); border: 1px solid var(--line); border-radius: 6px; padding: 6px 10px; margin-bottom: 10px; flex-wrap: wrap; }
  .toolbar-label { font-size: 9px; font-weight: 700; color: var(--mid); letter-spacing: 0.08em; text-transform: uppercase; }
  .tbtn { border: 1px solid var(--line); background: #fff; color: var(--ink); padding: 3px 10px; border-radius: 4px; font-size: 10px; font-family: 'Noto Sans KR', sans-serif; cursor: pointer; transition: all 0.12s; white-space: nowrap; }
  .tbtn:hover { border-color: var(--acc); color: var(--acc); }
  .tbtn.teacher { border-color: var(--acc); color: var(--acc); font-weight: 700; }
  .tbtn.student { border-color: #2d6a4f; color: #2d6a4f; font-weight: 700; }
  .sep { width: 1px; height: 18px; background: var(--line); margin: 0 2px; }
  .title-input { border: 1px solid var(--line); border-radius: 4px; padding: 3px 8px; font-size: 11px; font-weight: 700; font-family: 'Noto Sans KR', sans-serif; color: var(--ink); width: 160px; outline: none; }
  .title-input:focus { border-color: var(--acc); }

  /* S2 CONTROLS */
  .s2-controls { display: flex; align-items: center; gap: 10px; background: #fff8f5; border: 1px solid #e8c9be; border-radius: 5px; padding: 5px 10px; margin-bottom: 8px; flex-wrap: wrap; }
  .s2-ctrl-label { font-size: 9px; font-weight: 700; color: var(--acc); }
  .ctrl-group { display: flex; align-items: center; gap: 5px; }
  .ctrl-group label { font-size: 9.5px; color: var(--mid); }
  .ctrl-group input[type=range] { width: 80px; accent-color: var(--acc); }
  .ctrl-val { font-size: 9.5px; font-weight: 700; color: var(--acc); min-width: 32px; }

  /* HEADER */
  .hd { display: flex; justify-content: space-between; align-items: flex-end; border-bottom: 2px solid var(--ink); padding-bottom: 5px; margin-bottom: 10px; }
  .hd-title { font-size: 14px; font-weight: 700; }
  .hd-title small { font-size: 10px; font-weight: 400; color: var(--mid); margin-left: 6px; }
  .hd-info { display: flex; gap: 16px; font-size: 10px; color: var(--mid); }
  .hd-info span { border-bottom: 1px solid var(--line); min-width: 80px; }

  /* SECTION */
  .sec { font-size: 9.5px; font-weight: 700; letter-spacing: 0.12em; color: var(--acc); text-transform: uppercase; border-left: 3px solid var(--acc); padding-left: 6px; margin: 12px 0 6px; }
  .task { margin-bottom: var(--s2-gap); padding-bottom: var(--s2-gap); border-bottom: 1px dashed var(--line); }
  .task:last-child { border-bottom: none; }
  .tlabel { font-size: 9px; font-weight: 700; color: var(--mid); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 5px; display: flex; align-items: center; gap: 6px; }
  .tlabel::after { content: ""; flex: 1; height: 1px; background: var(--line); }

  /* SECTION 2 dynamic */
  #section2 { font-size: var(--s2-size); }
  #section2 .task { margin-bottom: var(--s2-gap); padding-bottom: var(--s2-gap); }
  #section2 .q { font-size: calc(var(--s2-size) * 0.96); margin-bottom: 6px; }
  #section2 .aline { height: calc(var(--s2-gap) * 2.5); margin: 3px 0 8px; }

  /* STEPWISE 2-column */
  .sw-num { font-family: "Noto Sans KR", sans-serif; font-size: 8.5px; font-weight: 700; color: var(--acc); margin-right: 4px; vertical-align: top; display: inline-block; min-width: 14px; }
  .sw-grid { 
    display: grid; 
    grid-template-columns: 1fr 1fr; 
    grid-auto-flow: column;
    grid-template-rows: repeat(var(--sw-rows, 5), auto);
    gap: 8px 20px; 
    align-items: start; 
  }
  .sw-block { margin-bottom: 4px; }
  .sw-en { font-family: 'EB Garamond', serif; font-size: 12px; white-space: pre-wrap; line-height: 1.5; }
  .sw-ko { white-space: pre-wrap; font-size: 10px; color: var(--mid); line-height: 1.45; padding-left: 6px; border-left: 2px solid var(--gold); margin-top: 1px; }

  /* SHARED */
  .wb { border: 1px solid var(--line); border-radius: 4px; padding: 5px 8px; margin-bottom: 6px; font-size: 10.5px; line-height: 1.9; }
  .wb b { color: var(--acc); }
  .wt { display: inline-block; border: 1px solid var(--line); border-radius: 3px; padding: 0 5px; margin: 1px 2px; font-family: 'EB Garamond', serif; font-size: 11.5px; }
  .ltog { display: inline-flex; border: 1px solid var(--line); border-radius: 4px; overflow: hidden; margin-bottom: 5px; }
  .lbtn { padding: 3px 10px; background: none; border: none; cursor: pointer; color: var(--mid); font-family: 'Noto Sans KR', sans-serif; font-size: 9.5px; font-weight: 500; transition: all 0.12s; }
  .lbtn.active { background: var(--fill); color: var(--acc); font-weight: 700; }
  .q { margin-bottom: 6px; font-size: 11px; line-height: 1.9; }
  .qn { font-weight: 700; color: var(--acc); margin-right: 3px; }
  .bl { display: inline-block; border-bottom: 1px solid var(--ink); min-width: 70px; margin: 0 2px; }
  .bl-sm { min-width: 46px; } .bl-lg { min-width: 110px; }
  .qt { border-left: 2px solid var(--line); padding: 4px 8px; font-family: 'EB Garamond', serif; font-size: 12px; font-style: italic; border-radius: 0 3px 3px 0; margin: 4px 0 6px; color: var(--mid); }
  .qt b { color: var(--ink); }
  .aline { border-bottom: 1px solid var(--line); height: 22px; margin: 3px 0 8px; }
  .vtbl { width: 100%; border-collapse: collapse; font-size: 10.5px; margin: 5px 0; }
  .vtbl th { border-bottom: 1.5px solid var(--ink); border-top: 1px solid var(--line); padding: 4px 6px; font-size: 9px; font-weight: 700; text-align: left; color: var(--mid); background: none; }
  .vtbl td { border-bottom: 1px solid var(--line); padding: 4px 6px; }
  .vtbl td:first-child { font-family: 'EB Garamond', serif; font-weight: 600; font-size: 12px; }
  .fc { background: var(--fill); }
  .chips { display: flex; flex-wrap: wrap; gap: 5px; margin: 5px 0; }
  .chip { border: 1px solid var(--ink); font-family: 'EB Garamond', serif; font-size: 11.5px; padding: 2px 9px; border-radius: 3px; }
  .tf-head { font-size: 9px; font-weight: 700; color: var(--mid); letter-spacing: 0.1em; margin: 8px 0 4px; }
  .tfl { list-style: none; }
  .tfi { display: flex; align-items: flex-start; gap: 5px; padding: 3px 0; border-bottom: 1px dotted var(--line); font-size: 10.5px; line-height: 1.6; }
  .tfn { font-weight: 700; color: var(--acc); min-width: 16px; font-size: 9.5px; padding-top: 2px; }
  .tfbox { display: flex; gap: 2px; padding-top: 1px; }
  .tfb { width: 24px; height: 18px; border: 1px solid var(--line); border-radius: 3px; background: none; font-size: 9px; font-weight: 700; cursor: pointer; color: var(--mid); font-family: 'Noto Sans KR', sans-serif; transition: all 0.1s; }
  .tfb:hover { border-color: var(--acc); color: var(--acc); }
  .tfb.sel-T { border-color: #2d6a4f; color: #2d6a4f; }
  .tfb.sel-F { border-color: var(--acc); color: var(--acc); }
  .tfb.ok { border-color: #2d6a4f; color: #2d6a4f; }
  .tfb.no { border-color: #c0392b; color: #c0392b; text-decoration: line-through; }
  .chkbtn { margin-top: 6px; border: 1px solid var(--ink); color: var(--ink); background: none; padding: 3px 12px; border-radius: 4px; font-size: 9.5px; font-family: 'Noto Sans KR', sans-serif; cursor: pointer; }
  .chkbtn:hover { background: var(--fill); }
  .sbadge { display: none; font-size: 9.5px; border: 1px solid var(--line); padding: 2px 10px; border-radius: 10px; margin-left: 6px; font-weight: 700; }
  .div { border-top: 1px dashed var(--line); margin: 10px 0; }

  /* ANSWER KEY */
  .ak-wrap { border-top: 2px solid var(--ink); margin-top: 16px; padding-top: 10px; }
  .ak-head { font-size: 10px; font-weight: 700; letter-spacing: 0.1em; color: var(--acc); margin-bottom: 6px; display: flex; align-items: center; gap: 8px; }
  .ak-head::after { content: ""; flex: 1; height: 1px; background: var(--line); }
  .ak-sec { font-size: 8.5px; font-weight: 700; color: var(--mid); letter-spacing: 0.06em; margin: 6px 0 2px; }
  .ak-row { display: flex; flex-wrap: wrap; gap: 2px 14px; font-size: 10px; margin-bottom: 3px; }
  .ak-item b { color: var(--acc); }
  .ak-tf { width: 100%; border-collapse: collapse; font-size: 10px; margin: 2px 0 4px; }
  .ak-tf th { border: 1px solid var(--line); padding: 2px 0; text-align: center; font-size: 8.5px; font-weight: 700; color: var(--mid); background: var(--fill); width: 10%; }
  .ak-tf td { border: 1px solid var(--line); padding: 2px 0; text-align: center; font-weight: 700; }
  .t-mark { color: #2d6a4f; } .f-mark { color: var(--acc); }

  /* PRINT MODES */
  @media print {
    .toolbar, .s2-controls, .chkbtn, .ltog, .div { display: none !important; }
    body { padding: 6px 10px; font-size: var(--s2-size); }
    .task { page-break-inside: avoid; }
    .sw-grid { grid-template-columns: 1fr 1fr; }
  }

  /* Teacher print: show all */
  body.print-teacher #section1,
  body.print-teacher #section2,
  body.print-teacher .ak-wrap { display: block !important; }
  body.print-teacher .toolbar,
  body.print-teacher .s2-controls { display: none !important; }

  /* Student print: section2 + no answers */
  body.print-student #section1 { display: none !important; }
  body.print-student .ak-wrap { display: none !important; }
  body.print-student .toolbar,
  body.print-student .s2-controls { display: none !important; }
</style>
</head>
<body>

<!-- INPUT SCREEN -->
<div class="input-screen" id="inputScreen">
  <div class="input-title">CM 실전 워크북 <small>지문을 입력하면 워크북이 자동 생성됩니다</small></div>
  <div class="input-row">
    <span class="input-label">제목</span>
    <input class="title-inp" id="titleInp" type="text" placeholder="예: 1학기 중간고사 36번">
  </div>
  <div class="input-row">
    <span class="input-label">난이도</span>
    <div class="level-chips">
      <button class="level-chip" onclick="setLevel('중등')">중등</button>
      <button class="level-chip active" onclick="setLevel('고등')">고등</button>
      <button class="level-chip" onclick="setLevel('수능')">수능</button>
    </div>
  </div>
  <div class="input-row">
    <span class="input-label">AI 모델</span>
    <div class="level-chips">
      <button class="level-chip active" id="m-haiku" onclick="setModel('claude-haiku-4-5-20251001')">⚡ Haiku (빠름·저렴)</button>
      <button class="level-chip" id="m-sonnet" onclick="setModel('claude-sonnet-4-5-20250929')">🧠 Sonnet (정확)</button>
    </div>
  </div>
  <div class="input-row">
    <span class="input-label">생성 범위</span>
    <div class="level-chips">
      <button class="level-chip" id="mode-s1" onclick="setMode('s1')">📋 지문 분석만</button>
      <button class="level-chip" id="mode-s2" onclick="setMode('s2')">📝 워크북만</button>
      <button class="level-chip active" id="mode-both" onclick="setMode('both')">✦ 둘 다 (기본)</button>
    </div>
  </div>
  <textarea class="passage-inp" id="passageInp" placeholder="여기에 영어 지문을 붙여넣으세요..."></textarea>
  <button class="gen-btn" id="genBtn" onclick="generate()">✦ 워크북 생성하기</button>
</div>

<!-- LOADING -->
<div class="loading" id="loading">
  <div class="spinner"></div>
  <div class="loading-txt">워크북 생성 중...<br><span style="font-size:10px;color:#bbb;">보통 20~40초 소요됩니다</span></div>
</div>

<!-- WORKBOOK OUTPUT -->
<div id="workbook-output" style="display:none;">

  <!-- TOOLBAR -->
  <div class="toolbar">
    <span class="toolbar-label">제목</span>
    <input class="title-input" id="titleInput" type="text" placeholder="제목 입력" oninput="syncTitle(this.value)">
    <div class="sep"></div>
    <button class="tbtn teacher" onclick="printTeacher()">📋 [교사용] PDF</button>
    <button class="tbtn student" onclick="printStudent()">📝 [학생용] PDF</button>
    <div class="sep"></div>
    <button class="tbtn" onclick="resetApp()">↩ 새 지문</button>
    <div class="sep"></div>
    <span class="toolbar-label">출력 설정</span>
    <div class="ctrl-group">
      <label>글자</label>
      <input type="range" id="sizeRange" min="9" max="15" step="0.5" value="11.5" oninput="updateSize(this.value)">
      <span class="ctrl-val" id="sizeVal">11.5px</span>
    </div>
    <div class="ctrl-group">
      <label>여백</label>
      <input type="range" id="gapRange" min="6" max="20" step="1" value="10" oninput="updateGap(this.value)">
      <span class="ctrl-val" id="gapVal">10px</span>
    </div>
  </div>

  <!-- HEADER (한 번만) -->
  <div class="hd">
    <div class="hd-title" id="hdTitle">CM Workbook <small>Level 1</small></div>
    <div class="hd-info">
      <span>이름:&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</span>
      <span>날짜:&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</span>
      <span>점수:&nbsp;&nbsp;&nbsp;&nbsp;</span>
    </div>
  </div>

  <!-- SECTION 1 -->
  <div id="section1"></div>

  <div class="div"></div>

  <!-- S2 CONTROLS -->
  <div class="s2-controls">
    <span class="s2-ctrl-label">📄 학생용 출력 설정</span>
    <div class="ctrl-group">
      <label>글자</label>
      <input type="range" min="9" max="15" step="0.5" value="11.5" oninput="updateSize(this.value)">
      <span class="ctrl-val">11.5px</span>
    </div>
    <div class="ctrl-group">
      <label>여백</label>
      <input type="range" min="6" max="20" step="1" value="10" oninput="updateGap(this.value)">
      <span class="ctrl-val">10px</span>
    </div>
  </div>

  <!-- SECTION 2 -->
  <div id="section2"></div>

  <!-- ANSWER KEY (교사용 전용) -->
  <div class="ak-wrap" id="answerKey"></div>

</div>

<script>
let selectedLevel = '고등';
let selectedModel = 'claude-haiku-4-5-20251001';
let selectedMode = 'both';

function setModel(m) {
  selectedModel = m;
  document.getElementById('m-haiku').classList.toggle('active', m === 'claude-haiku-4-5-20251001');
  document.getElementById('m-sonnet').classList.toggle('active', m === 'claude-sonnet-4-5-20250929');
}

function setMode(m) {
  selectedMode = m;
  document.getElementById('mode-s1').classList.toggle('active', m === 's1');
  document.getElementById('mode-s2').classList.toggle('active', m === 's2');
  document.getElementById('mode-both').classList.toggle('active', m === 'both');
}
let currentTitle = '';
const SEL = { ko: Array(10).fill(null), en: Array(10).fill(null) };

function setLevel(l) {
  selectedLevel = l;
  document.querySelectorAll('.level-chip').forEach(b => b.classList.toggle('active', b.textContent === l));
}

function syncTitle(v) {
  currentTitle = v;
  document.getElementById('hdTitle').innerHTML = `${v || 'CM Workbook'} <small>${selectedLevel} · Level 1</small>`;
}

function updateSize(v) {
  document.documentElement.style.setProperty('--s2-size', v+'px');
  document.getElementById('sizeVal').textContent = v+'px';
}

function updateGap(v) {
  document.documentElement.style.setProperty('--s2-gap', v+'px');
  document.getElementById('gapVal').textContent = v+'px';
}

function printTeacher() {
  document.title = `[교사용] ${currentTitle || 'CM_Workbook'}`;
  document.body.classList.remove('print-student');
  document.body.classList.add('print-teacher');
  window.print();
  setTimeout(() => document.body.classList.remove('print-teacher'), 1000);
}

function printStudent() {
  document.title = `[학생용] ${currentTitle || 'CM_Workbook'}`;
  document.body.classList.remove('print-teacher');
  document.body.classList.add('print-student');
  window.print();
  setTimeout(() => document.body.classList.remove('print-student'), 1000);
}

function resetApp() {
  document.getElementById('inputScreen').style.display = 'flex';
  document.getElementById('workbook-output').style.display = 'none';
  document.getElementById('loading').classList.remove('show');
  document.getElementById('genBtn').disabled = false;
}

async function generate() {
  const passage = document.getElementById('passageInp').value.trim();
  const title = document.getElementById('titleInp').value.trim();
  if (!passage) { alert('지문을 입력해주세요!'); return; }
  currentTitle = title;

  document.getElementById('inputScreen').style.display = 'none';
  document.getElementById('loading').classList.add('show');
  document.getElementById('genBtn').disabled = true;

  try {
    let s1data = null, s2data = null;

    if (selectedMode === 'both') {
      document.querySelector('.loading-txt').innerHTML = '1/2 CM 지문 분석 생성 중...<br><span style="font-size:10px;color:#bbb;">Haiku 2회 호출로 빠르고 저렴하게</span>';
      s1data = await callClaudeS1(passage, selectedLevel, title);
      document.querySelector('.loading-txt').innerHTML = '2/2 CM 실전 워크북 생성 중...<br><span style="font-size:10px;color:#bbb;">잠시만 기다려주세요</span>';
      s2data = await callClaudeS2(passage, selectedLevel, title);
    } else if (selectedMode === 's1') {
      document.querySelector('.loading-txt').innerHTML = 'CM 지문 분석 생성 중...<br><span style="font-size:10px;color:#bbb;">보통 15~25초 소요됩니다</span>';
      s1data = await callClaudeS1(passage, selectedLevel, title);
    } else {
      document.querySelector('.loading-txt').innerHTML = 'CM 실전 워크북 생성 중...<br><span style="font-size:10px;color:#bbb;">보통 15~25초 소요됩니다</span>';
      s2data = await callClaudeS2(passage, selectedLevel, title);
    }

    renderWorkbook(s1data, s2data, title, selectedLevel);
    document.getElementById('loading').classList.remove('show');
    document.getElementById('workbook-output').style.display = 'block';
  } catch(e) {
    document.getElementById('loading').classList.remove('show');
    document.getElementById('inputScreen').style.display = 'flex';
    document.getElementById('genBtn').disabled = false;
    alert('오류가 발생했습니다: ' + e.message);
  }
}

async function callClaudeS1(passage, level, title) {

제목: ${title || '영어 워크북'}

지문: """${passage}"""

반드시 JSON만 출력하세요. 마크다운 없이 순수 JSON만.

{
  "story": "지문 핵심 영단어를 녹여낸 친근한 스토리텔링 (3~4문장, 한국어)",
  "logic": [
    {"num":1,"sentence":"원문 문장 전체","role":"논리적 기능(주제제시/원인/예시/결론 등)","keywords":"핵심 키워드"}
  ],
  "participles": [

      "original":"해당 구문이 포함된 원문 문장 전체",
      "phrase":"해당 구문 부분만",
      "restored_coord":"등위절로 복원",
      "restored_rel":"관계절로 복원 (해당시)",
      "note":"문법 성격 및 의미",
      "pick":true
    }
  ],
  "relatives": [
    {"original":"관계사절 포함 원문 문장 전체","clause":"관계사절 부분","antecedent":"선행사","relative":"관계사","restored":"분사구문으로 복원한 문장","note":"관계사 역할"}
  ],
  "references": [
    {"type":"인칭대명사/지시대명사/부정대명사","pronoun":"대명사","sentence":"원문 문장 전체","target":"지칭 대상","pick":true}
  ],
  "vocab": [
    {"word":"단어","syn":"동의어","ant":"반의어"}
  ]
}

규칙:
- logic: 지문의 모든 문장 번호순. 7문장이면 7개, 누락 절대 금지
- participles: 한국 중고등 교육 기준으로 아래 유형만 탐지. 없으면 []
  ★ 포함할 것:
  ① 분사구문(-ing/-ed): 문장 앞/중간/뒤에서 부사절 역할 (시간/이유/조건/양보/부대상황)
     예: Turning left, he saw... / Written in 1990, the book...
  ② with+분사구문: with+명사+분사 구조
     예: With his eyes closed, he sat there.
  ③ 독립분사구문: 주절과 다른 의미상 주어
     예: Weather permitting, we will go out.
  ④ being 생략 분사구문: (Being) + 형용사/명사/분사
     예: (Being) Tired, she went to bed.
  ⑤ 후치수식 현재분사(-ing): 명사 뒤에서 형용사 역할
     예: the man standing there
  ⑥ 후치수식 과거분사(-ed/pp): 명사 뒤에서 형용사 역할
     예: the window broken yesterday
  ⑦ 가주어/가목적어 it 구문: It is ~ to-v / find it ~ to-v
     예: It is important to exercise. / I find it hard to believe.

  ★ 절대 포함하지 말 것 (한국 중고등 교육에서 분사구문과 구분되는 항목):
  - 동명사(-ing): 주어/목적어/보어로 쓰인 것 (예: Swimming is fun. / I enjoy reading.)
  - 현재진행형: be + -ing (예: She is running.)
  - 형용사적 용법 to부정사 (예: a book to read)
  - 일반 수동태 (예: The window was broken.)

  ★ pick 기준 (한국 수능/내신 출제 빈도 높은 것):
  - pick: true → 분사구문 앞뒤 절 연결 관계가 복잡하거나, 의미상 주어 파악이 어려운 것
  - pick: false → 단순 후치수식, 의미가 명확한 것
- relatives: who/which/that/where/when 모두. 현재/과거분사→관계사 변환 가능한 경우 포함. 없으면 []
- references: 아래 기준으로 탐지. 없으면 []
  ★ 포함할 것:
  ① 지시대명사: this/that/these/those (앞 내용 지칭)
  ② 부정대명사: one/another/the other/others/the others
  ③ 가주어/가목적어 it: It is ~ to-v / It is ~ that~ / find it ~ to-v
  ④ 인칭대명사 중 지칭 대상이 명확하지 않거나 시험에 나올 만한 것:
     they/them/it/this/that → 앞 문장의 개념/사물/상황을 받는 경우

  ★ 포함하지 말 것:
  - 일반인 지칭 he/she/they (특정 인물 지칭이 아닌 일반적 사람)
  - 문맥상 너무 명백한 대명사 (바로 앞 명사를 단순 반복 받는 경우)
  - you/we (화자·청자 지칭)

  ★ pick 기준: 수능/내신에서 밑줄→지칭 추론 문제로 출제 가능한 것만 true
- vocab: 6~8개, 지문 실제 등장 단어만
- 번역: 관용어구 직역 금지, 수능 교육 현장 용어, 명사형 우선`;

  const res = await fetch('/api/proxy', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: selectedModel,
      max_tokens: 8192,
      messages: [{ role: 'user', content: prompt }]
    })
  });
  const data = await res.json();
  if (!res.ok) {
    const errMsg = data?.error?.message || JSON.stringify(data);
    throw new Error('API 오류 ' + res.status + ': ' + errMsg);
  }
  const text = data.content.map(c => c.text || '').join('');
  const clean = text.replace(/```json|```/g, '').trim();
  return JSON.parse(clean);
}

      <p style="font-size:10px;font-weight:700;color:var(--mid);margin:6px 0 3px;">Step 2 — 단어를 배열하여 영어 주제문을 완성하시오.</p>
      <div class="chips">${chips}</div>
      <div class="aline"></div>
    </div>
    <div class="task">
      <div class="tlabel">Task 5 · 어휘 매칭</div>
      <table class="vtbl">
        <tr><th>단어</th><th>동의어</th><th>반의어</th></tr>
        ${t5rows}
      </table>
    </div>
    <div class="task">
      <div class="tlabel">Task 6 · 고난도 T/F</div>
      <div class="tf-head">🇰🇷 한글 10문항</div>
      <ul class="tfl" id="tf-ko">${tfKo}</ul>
      <button class="chkbtn" onclick="chkTF('ko')">✓ 채점</button>
      <span class="sbadge" id="sc-ko"></span>
      <div class="tf-head" style="margin-top:10px;">🇺🇸 English 10 T/F</div>
      <ul class="tfl" id="tf-en">${tfEn}</ul>
      <button class="chkbtn" onclick="chkTF('en')">✓ Check</button>
      <span class="sbadge" id="sc-en"></span>
    </div>
  `;

  } else {
    document.getElementById('section2').style.display = 'none';
  }

  // ANSWER KEY
  const t1ans = s2.task1_ko.map((item,i)=>`<span class="ak-item"><b>${i+1}.</b> ${item.answers.join(' / ')}</span>`).join('');
  const tfKoG = s2.tf_ko.map(i=>`<td class="${i.answer==='T'?'t-mark':'f-mark'}">${i.answer}</td>`).join('');
  const tfEnG = s2.tf_en.map(i=>`<td class="${i.answer==='T'?'t-mark':'f-mark'}">${i.answer}</td>`).join('');
  const nums = Array.from({length:10},(_,i)=>`<th>${i+1}</th>`).join('');

  document.getElementById('answerKey').innerHTML = `
    <div class="ak-head">✂ 정답지 <span style="font-size:8.5px;font-weight:400;color:var(--light);">교사용</span></div>
    <div class="ak-sec">Task 1</div><div class="ak-row">${t1ans}</div>
    <div class="ak-sec">Task 2</div>
    <div class="ak-row">
      <span class="ak-item"><b>A.</b> ${s2.task2a.answer_coord}</span>
      <span class="ak-item"><b>B.</b> ${s2.task2b.answer}</span>
    </div>
    <div class="ak-sec">Task 3</div><div class="ak-row"><span class="ak-item">${s2.task3.answer_ko}</span></div>
    <div class="ak-sec">Task 4</div><div class="ak-row"><span class="ak-item"><b>Step 2:</b> ${s2.task4.answer_en}</span></div>
    <div class="ak-sec">Task 5</div>
    <div class="ak-row">${s2.task5.map(v=>`<span class="ak-item"><b>${v.word}</b> 동: ${v.syn_ans} / 반: ${v.ant_ans}</span>`).join('')}</div>
    <div class="ak-sec">Task 6 · T/F</div>
    <table class="ak-tf">
      <tr><th colspan="10" style="text-align:left;padding-left:4px;border:none;background:none;color:var(--mid);">🇰🇷 한글</th></tr>
      <tr>${nums}</tr><tr>${tfKoG}</tr>
      <tr><th colspan="10" style="text-align:left;padding-left:4px;border:none;background:none;color:var(--mid);padding-top:5px;">🇺🇸 English</th></tr>
      <tr>${nums}</tr><tr>${tfEnG}</tr>
    </table>
  `;

  window._tfAns = { ko: s2.tf_ko.map(i=>i.answer), en: s2.tf_en.map(i=>i.answer) };
}

function setLang(l) {
  document.getElementById('qs-ko').style.display = l==='ko'?'block':'none';
  document.getElementById('qs-en').style.display = l==='en'?'block':'none';
  document.getElementById('btn-ko').classList.toggle('active', l==='ko');
  document.getElementById('btn-en').classList.toggle('active', l==='en');
}

function selTF(btn, v, lang, i) {
  btn.parentElement.querySelectorAll('.tfb').forEach(b=>b.className='tfb');
  btn.classList.add('sel-'+v);
  SEL[lang][i] = v;
}

function chkTF(lang) {
  const ans = window._tfAns?.[lang] || [];
  let score = 0;
  document.getElementById('tf-'+lang).querySelectorAll('.tfi').forEach((item,i)=>{
    item.querySelectorAll('.tfb').forEach(b=>{
      const bv = b.textContent.trim();
      b.className = 'tfb';
      if (bv===ans[i]) b.classList.add('ok');
      if (SEL[lang][i]===bv && bv!==ans[i]) b.classList.add('no');
    });
    if (SEL[lang][i]===ans[i]) score++;
  });
  const bd = document.getElementById('sc-'+lang);
  bd.style.display = 'inline-block';
  bd.textContent = score+'/10';
  bd.style.background = score>=8?'#eaf5ee':score>=5?'#fff8e1':'#fdecea';
}
</script>
</body>
</html>
