<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CM 실전 워크북</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&family=EB+Garamond:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #111; --mid: #555; --light: #888;
    --line: #bbb; --fill: #f8f6f2;
    --acc: #7a2e1a; --gold: #a07828;
    --s2-size: 11.5px; --s2-gap: 8px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #fff; color: var(--ink);
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 11.5px; line-height: 1.55;
    padding: 12px 16px; max-width: 800px; margin: 0 auto;
  }

  /* INPUT SCREEN */
  .input-screen {
    min-height: 100vh; display: flex; flex-direction: column;
    justify-content: center; gap: 12px;
  }
  .input-title {
    font-size: 18px; font-weight: 700; color: var(--ink);
    border-bottom: 2px solid var(--ink); padding-bottom: 8px; margin-bottom: 4px;
  }
  .input-title small { font-size: 11px; font-weight: 400; color: var(--mid); margin-left: 8px; }
  .input-row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
  .input-label { font-size: 10px; font-weight: 700; color: var(--mid); letter-spacing: 0.06em; min-width: 60px; }
  .title-inp {
    flex: 1; border: 1px solid var(--line); border-radius: 4px;
    padding: 5px 10px; font-size: 12px; font-family: 'Noto Sans KR', sans-serif;
    outline: none; min-width: 200px;
  }
  .title-inp:focus { border-color: var(--acc); }
  .passage-inp {
    width: 100%; border: 1px solid var(--line); border-radius: 6px;
    padding: 10px 12px; font-size: 12px; font-family: 'EB Garamond', serif;
    line-height: 1.7; resize: vertical; min-height: 160px; outline: none;
  }
  .passage-inp:focus { border-color: var(--acc); }
  .level-chips { display: flex; gap: 6px; }
  .level-chip {
    border: 1px solid var(--line); border-radius: 4px;
    padding: 3px 12px; font-size: 10px; font-family: 'Noto Sans KR', sans-serif;
    cursor: pointer; color: var(--mid); background: none; transition: all 0.12s;
  }
  .level-chip.active { border-color: var(--acc); color: var(--acc); font-weight: 700; background: #fff5f3; }
  .gen-btn {
    width: 100%; padding: 10px; border: none; border-radius: 6px;
    background: var(--ink); color: #fff; font-size: 13px; font-weight: 700;
    font-family: 'Noto Sans KR', sans-serif; cursor: pointer; transition: all 0.15s;
  }
  .gen-btn:hover { background: var(--acc); }
  .gen-btn:disabled { background: #ccc; cursor: not-allowed; }

  /* LOADING */
  .loading {
    display: none; text-align: center; padding: 60px 0;
  }
  .loading.show { display: block; }
  .spinner {
    width: 36px; height: 36px; border: 3px solid var(--line);
    border-top-color: var(--acc); border-radius: 50%;
    animation: spin 0.8s linear infinite; margin: 0 auto 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-txt { font-size: 12px; color: var(--mid); }

  /* TOOLBAR */
  .toolbar {
    display: flex; gap: 8px; align-items: center;
    background: var(--fill); border: 1px solid var(--line);
    border-radius: 6px; padding: 6px 10px;
    margin-bottom: 10px; flex-wrap: wrap;
  }
  .toolbar-label { font-size: 9px; font-weight: 700; color: var(--mid); letter-spacing: 0.08em; text-transform: uppercase; margin-right: 4px; }
  .tbtn {
    border: 1px solid var(--line); background: #fff; color: var(--ink);
    padding: 3px 12px; border-radius: 4px; font-size: 10px;
    font-family: 'Noto Sans KR', sans-serif; cursor: pointer; transition: all 0.12s; white-space: nowrap;
  }
  .tbtn:hover { border-color: var(--acc); color: var(--acc); }
  .tbtn.primary { border-color: var(--acc); color: var(--acc); font-weight: 700; }
  .sep { width: 1px; height: 18px; background: var(--line); margin: 0 4px; }
  .title-input {
    border: 1px solid var(--line); border-radius: 4px;
    padding: 3px 8px; font-size: 11px; font-weight: 700;
    font-family: 'Noto Sans KR', sans-serif; color: var(--ink);
    width: 180px; outline: none;
  }
  .title-input:focus { border-color: var(--acc); }

  /* S2 CONTROLS */
  .s2-controls {
    display: flex; align-items: center; gap: 10px;
    background: #fff8f5; border: 1px solid #e8c9be;
    border-radius: 5px; padding: 5px 10px; margin-bottom: 8px; flex-wrap: wrap;
  }
  .s2-ctrl-label { font-size: 9px; font-weight: 700; color: var(--acc); letter-spacing: 0.06em; }
  .ctrl-group { display: flex; align-items: center; gap: 5px; }
  .ctrl-group label { font-size: 9.5px; color: var(--mid); }
  .ctrl-group input[type=range] { width: 80px; accent-color: var(--acc); }
  .ctrl-val { font-size: 9.5px; font-weight: 700; color: var(--acc); min-width: 28px; }

  /* HEADER */
  .hd {
    display: flex; justify-content: space-between; align-items: flex-end;
    border-bottom: 2px solid var(--ink); padding-bottom: 5px; margin-bottom: 8px;
  }
  .hd-title { font-size: 13px; font-weight: 700; }
  .hd-title small { font-size: 10px; font-weight: 400; color: var(--mid); margin-left: 6px; }
  .hd-info { display: flex; gap: 16px; font-size: 10px; color: var(--mid); }
  .hd-info span { border-bottom: 1px solid var(--line); min-width: 80px; }

  /* SECTION */
  .sec { font-size: 9.5px; font-weight: 700; letter-spacing: 0.12em; color: var(--acc); text-transform: uppercase; border-left: 3px solid var(--acc); padding-left: 6px; margin: 10px 0 5px; }
  .task { margin-bottom: 8px; }
  .tlabel { font-size: 9px; font-weight: 700; color: var(--mid); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 3px; display: flex; align-items: center; gap: 6px; }
  .tlabel::after { content: ""; flex: 1; height: 1px; background: var(--line); }

  /* SECTION 2 dynamic */
  #section2 { font-size: var(--s2-size); }
  #section2 .task { margin-bottom: var(--s2-gap); }
  #section2 .q { font-size: calc(var(--s2-size) * 0.96); }
  #section2 .sw-en { font-size: calc(var(--s2-size) * 1.04); }
  #section2 .sw-ko { font-size: calc(var(--s2-size) * 0.91); }
  #section2 .tfi { font-size: calc(var(--s2-size) * 0.91); }
  #section2 .aline { height: calc(var(--s2-gap) * 2.2); margin: 2px 0 var(--s2-gap); }

  /* SHARED */
  .sw-block { margin-bottom: 6px; }
  .sw-en { font-family: 'EB Garamond', serif; font-size: 12px; white-space: pre-wrap; line-height: 1.5; }
  .sw-ko { white-space: pre-wrap; font-size: 10.5px; color: var(--mid); line-height: 1.45; padding-left: 8px; border-left: 2px solid var(--gold); margin-top: 1px; }
  .wb { border: 1px solid var(--line); border-radius: 4px; padding: 4px 8px; margin-bottom: 5px; font-size: 10.5px; line-height: 1.8; }
  .wb b { color: var(--acc); }
  .wt { display: inline-block; border: 1px solid var(--line); border-radius: 3px; padding: 0 5px; margin: 1px 2px; font-family: 'EB Garamond', serif; font-size: 11.5px; }
  .ltog { display: inline-flex; border: 1px solid var(--line); border-radius: 4px; overflow: hidden; margin-bottom: 4px; }
  .lbtn { padding: 2px 10px; background: none; border: none; cursor: pointer; color: var(--mid); font-family: 'Noto Sans KR', sans-serif; font-size: 9.5px; font-weight: 500; transition: all 0.12s; }
  .lbtn.active { background: var(--fill); color: var(--acc); font-weight: 700; }
  .q { margin-bottom: 4px; font-size: 11px; line-height: 1.8; }
  .qn { font-weight: 700; color: var(--acc); margin-right: 3px; }
  .bl { display: inline-block; border-bottom: 1px solid var(--ink); min-width: 70px; margin: 0 2px; }
  .bl-sm { min-width: 46px; } .bl-lg { min-width: 110px; }
  .qt { border-left: 2px solid var(--line); padding: 3px 8px; font-family: 'EB Garamond', serif; font-size: 12px; font-style: italic; border-radius: 0 3px 3px 0; margin: 3px 0 4px; color: var(--mid); }
  .qt b { color: var(--ink); }
  .aline { border-bottom: 1px solid var(--line); height: 18px; margin: 2px 0 6px; }
  .vtbl { width: 100%; border-collapse: collapse; font-size: 10.5px; margin: 4px 0; }
  .vtbl th { border-bottom: 1.5px solid var(--ink); border-top: 1px solid var(--line); padding: 3px 6px; font-size: 9px; font-weight: 700; text-align: left; color: var(--mid); background: none; }
  .vtbl td { border-bottom: 1px solid var(--line); padding: 3px 6px; }
  .vtbl td:first-child { font-family: 'EB Garamond', serif; font-weight: 600; font-size: 12px; }
  .fc { background: var(--fill); }
  .chips { display: flex; flex-wrap: wrap; gap: 4px; margin: 4px 0; }
  .chip { border: 1px solid var(--ink); font-family: 'EB Garamond', serif; font-size: 11.5px; padding: 1px 8px; border-radius: 3px; }
  .tf-head { font-size: 9px; font-weight: 700; color: var(--mid); letter-spacing: 0.1em; margin: 6px 0 3px; }
  .tfl { list-style: none; }
  .tfi { display: flex; align-items: flex-start; gap: 5px; padding: 2px 0; border-bottom: 1px dotted var(--line); font-size: 10.5px; line-height: 1.5; }
  .tfn { font-weight: 700; color: var(--acc); min-width: 14px; font-size: 9.5px; padding-top: 2px; }
  .tfbox { display: flex; gap: 2px; padding-top: 1px; }
  .tfb { width: 22px; height: 17px; border: 1px solid var(--line); border-radius: 3px; background: none; font-size: 9px; font-weight: 700; cursor: pointer; color: var(--mid); font-family: 'Noto Sans KR', sans-serif; transition: all 0.1s; }
  .tfb:hover { border-color: var(--acc); color: var(--acc); }
  .tfb.sel-T { border-color: #2d6a4f; color: #2d6a4f; }
  .tfb.sel-F { border-color: var(--acc); color: var(--acc); }
  .tfb.ok { border-color: #2d6a4f; color: #2d6a4f; }
  .tfb.no { border-color: #c0392b; color: #c0392b; text-decoration: line-through; }
  .chkbtn { margin-top: 5px; border: 1px solid var(--ink); color: var(--ink); background: none; padding: 3px 12px; border-radius: 4px; font-size: 9.5px; font-family: 'Noto Sans KR', sans-serif; cursor: pointer; }
  .chkbtn:hover { background: var(--fill); }
  .sbadge { display: none; font-size: 9.5px; border: 1px solid var(--line); padding: 2px 10px; border-radius: 10px; margin-left: 6px; font-weight: 700; }
  .div { border-top: 1px dashed var(--line); margin: 8px 0; }
  .doc-title { font-size: 14px; font-weight: 700; color: var(--ink); margin-bottom: 4px; display: none; }
  .doc-title.visible { display: block; }

  /* ANSWER KEY */
  .ak-wrap { border-top: 2px solid var(--ink); margin-top: 14px; padding-top: 8px; }
  .ak-head { font-size: 10px; font-weight: 700; letter-spacing: 0.1em; color: var(--acc); margin-bottom: 5px; display: flex; align-items: center; gap: 8px; }
  .ak-head::after { content: ""; flex: 1; height: 1px; background: var(--line); }
  .ak-sec { font-size: 8.5px; font-weight: 700; color: var(--mid); letter-spacing: 0.06em; margin: 5px 0 2px; }
  .ak-row { display: flex; flex-wrap: wrap; gap: 2px 14px; font-size: 10px; margin-bottom: 3px; }
  .ak-item b { color: var(--acc); }
  .ak-tf { width: 100%; border-collapse: collapse; font-size: 10px; margin: 2px 0 4px; }
  .ak-tf th { border: 1px solid var(--line); padding: 2px 0; text-align: center; font-size: 8.5px; font-weight: 700; color: var(--mid); background: var(--fill); width: 10%; }
  .ak-tf td { border: 1px solid var(--line); padding: 2px 0; text-align: center; font-weight: 700; }
  .t-mark { color: #2d6a4f; } .f-mark { color: var(--acc); }

  /* ERROR */
  .error-box { background: #fff5f5; border: 1px solid #e88; border-radius: 6px; padding: 12px 16px; font-size: 11px; color: #922; margin: 12px 0; }

  @media print {
    .toolbar, .s2-controls, .chkbtn, .ltog, #section1, .ak-wrap, .div, .input-screen, .loading { display: none !important; }
    body { padding: 0; margin: 0; font-size: var(--s2-size); }
    #workbook-output { display: block !important; }
    .doc-title { display: block !important; font-size: 15px; margin-bottom: 6px; }
    .sec { page-break-after: avoid; }
    .task { page-break-inside: avoid; }
  }
</style>
</head>
<body>

<!-- ═══ INPUT SCREEN ═══ -->
<div class="input-screen" id="inputScreen">
  <div class="input-title">CM 실전 워크북 <small>지문을 입력하면 워크북이 자동 생성됩니다</small></div>

  <div class="input-row">
    <span class="input-label">제목</span>
    <input class="title-inp" id="titleInp" type="text" placeholder="예: 1학기 중간고사 36번">
  </div>

  <div class="input-row">
    <span class="input-label">난이도</span>
    <div class="level-chips">
      <button class="level-chip" onclick="setLevel('중등')">중등</button>
      <button class="level-chip active" onclick="setLevel('고등')">고등</button>
      <button class="level-chip" onclick="setLevel('수능')">수능</button>
    </div>
  </div>

  <textarea class="passage-inp" id="passageInp" placeholder="여기에 영어 지문을 붙여넣으세요..."></textarea>

  <button class="gen-btn" id="genBtn" onclick="generate()">✦ 워크북 생성하기</button>
</div>

<!-- ═══ LOADING ═══ -->
<div class="loading" id="loading">
  <div class="spinner"></div>
  <div class="loading-txt">워크북 생성 중...<br><span style="font-size:10px;color:#bbb;">보통 20~40초 소요됩니다</span></div>
</div>

<!-- ═══ WORKBOOK OUTPUT ═══ -->
<div id="workbook-output" style="display:none;">

  <!-- TOOLBAR -->
  <div class="toolbar no-print">
    <span class="toolbar-label">저장</span>
    <input class="title-input" id="titleInput" type="text" placeholder="제목 입력" oninput="updateTitle(this.value)">
    <div class="sep"></div>
    <button class="tbtn primary" onclick="saveAll()">💾 전체 저장</button>
    <button class="tbtn" onclick="printS2()">🖨 Section 2 PDF</button>
    <div class="sep"></div>
    <button class="tbtn" onclick="resetApp()">↩ 새 지문</button>
    <div class="sep"></div>
    <span class="toolbar-label">출력 설정</span>
    <div class="ctrl-group">
      <label>글자</label>
      <input type="range" id="sizeRange" min="9" max="15" step="0.5" value="11.5" oninput="updateSize(this.value)">
      <span class="ctrl-val" id="sizeVal">11.5px</span>
    </div>
    <div class="ctrl-group">
      <label>여백</label>
      <input type="range" id="gapRange" min="4" max="18" step="1" value="8" oninput="updateGap(this.value)">
      <span class="ctrl-val" id="gapVal">8px</span>
    </div>
  </div>

  <div class="doc-title" id="docTitle"></div>

  <div class="hd">
    <div class="hd-title" id="hdTitle">CM Workbook <small>Level 1</small></div>
    <div class="hd-info">
      <span>이름:&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</span>
      <span>날짜:&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</span>
      <span>점수:&nbsp;&nbsp;&nbsp;&nbsp;</span>
    </div>
  </div>

  <!-- SECTION 1 -->
  <div id="section1"></div>

  <div class="div"></div>

  <!-- S2 CONTROLS -->
  <div class="s2-controls no-print">
    <span class="s2-ctrl-label">📄 CM 실전 워크북 출력 설정</span>
    <div class="ctrl-group">
      <label>글자 크기</label>
      <input type="range" min="9" max="15" step="0.5" value="11.5" oninput="updateSize(this.value)">
      <span class="ctrl-val">11.5px</span>
    </div>
    <div class="ctrl-group">
      <label>문항 여백</label>
      <input type="range" min="4" max="18" step="1" value="8" oninput="updateGap(this.value)">
      <span class="ctrl-val">8px</span>
    </div>
  </div>

  <!-- SECTION 2 -->
  <div id="section2"></div>

  <!-- ANSWER KEY -->
  <div class="ak-wrap no-print" id="answerKey"></div>

</div>

<script>
let selectedLevel = '고등';
let currentData = null;
const SEL = { ko: Array(10).fill(null), en: Array(10).fill(null) };

function setLevel(l) {
  selectedLevel = l;
  document.querySelectorAll('.level-chip').forEach(b => {
    b.classList.toggle('active', b.textContent === l);
  });
}

function updateTitle(v) {
  const el = document.getElementById('docTitle');
  el.textContent = v;
  el.classList.toggle('visible', !!v.trim());
}

function updateSize(v) {
  document.documentElement.style.setProperty('--s2-size', v+'px');
  document.querySelectorAll('#sizeVal, .ctrl-val').forEach(el => { if(el.id === 'sizeVal' || el.parentElement?.querySelector('input[min="9"]')) el.textContent = v+'px'; });
}

function updateGap(v) {
  document.documentElement.style.setProperty('--s2-gap', v+'px');
}

function saveAll() {
  const blob = new Blob([document.documentElement.outerHTML], {type:'text/html;charset=utf-8'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  const title = document.getElementById('titleInp').value || 'CM_Workbook';
  a.download = `CM_워크북_${title}.html`;
  a.click();
}

function printS2() { window.print(); }

function resetApp() {
  document.getElementById('inputScreen').style.display = 'flex';
  document.getElementById('workbook-output').style.display = 'none';
  document.getElementById('loading').classList.remove('show');
}

async function generate() {
  const passage = document.getElementById('passageInp').value.trim();
  const title = document.getElementById('titleInp').value.trim();
  if (!passage) { alert('지문을 입력해주세요!'); return; }

  document.getElementById('inputScreen').style.display = 'none';
  document.getElementById('loading').classList.add('show');
  document.getElementById('genBtn').disabled = true;

  try {
    const result = await callClaude(passage, selectedLevel, title);
    currentData = result;
    renderWorkbook(result, passage, title, selectedLevel);
    document.getElementById('loading').classList.remove('show');
    document.getElementById('workbook-output').style.display = 'block';
  } catch(e) {
    document.getElementById('loading').classList.remove('show');
    document.getElementById('inputScreen').style.display = 'flex';
    document.getElementById('genBtn').disabled = false;
    alert('오류가 발생했습니다: ' + e.message);
  }
}

async function callClaude(passage, level, title) {
  const prompt = `다음 영어 지문으로 CM 실전 워크북을 만들어주세요.
제목: ${title || '영어 워크북'}
난이도: ${level}
지문: """${passage}"""

반드시 JSON만 출력하세요. 마크다운 없이 순수 JSON만.

{
  "story": "지문 핵심 영단어를 녹여낸 친근한 스토리텔링 (3~4문장, 한국어)",
  "logic": [
    {"step":"① 문제제기","content":"내용","keywords":"키워드"},
    {"step":"② 원인","content":"내용","keywords":"키워드"},
    {"step":"③ 해결방향","content":"내용","keywords":"키워드"},
    {"step":"④ 결과","content":"내용","keywords":"키워드"}
  ],
  "participles": [
    {"original":"원문 분사구문","restored_coord":"등위절 복원","restored_rel":"관계절 복원","note":"문법 설명"}
  ],
  "references": [
    {"pronoun":"대명사","position":"위치","target":"지칭 대상","pick":true}
  ],
  "vocab": [
    {"word":"단어","syn":"동의어","ant":"반의어"}
  ],
  "stepwise": [
    {"en":"영어 계단식 (들여쓰기 포함, \\n으로 줄바꿈)","ko":"한글 해석 계단식 (들여쓰기 포함, \\n으로 줄바꿈)"}
  ],
  "task1_ko": [
    {"q":"한글 빈칸 문장 (빈칸은 ___ 표시)","answers":["정답1"]}
  ],
  "task1_en": [
    {"q":"영어 빈칸 문장 (빈칸은 ___ 표시)","answers":["정답1"]}
  ],
  "wordbank": ["단어1(뜻1)","단어2(뜻2)","단어3(뜻3)","단어4(뜻4)","단어5(뜻5)","단어6(뜻6)","단어7(뜻7)","단어8(뜻8)"],
  "task2a": {"sentence":"분사구문 포함 원문","answer_coord":"등위절 정답","answer_rel":"관계절 정답"},
  "task2b": {"sentence":"대명사 밑줄 문장","pronoun":"밑줄 대명사","answer":"지칭 대상 영어"},
  "task3": {"sentence":"★Pick 대명사 포함 문장","pronoun":"대명사","answer_ko":"한국어 정답"},

규칙:
- tf_ko: 10개, tf_en: 10개
- task1_ko, task1_en: 각 5개
- vocab: 6~8개
- stepwise: 지문 주요 문장 4~5개
- 번역 규칙: 관용어구 직역 금지, 수능 교육 현장 용어 기준, 명사형 우선
- participles가 없으면 빈 배열 []로`;

  const res = await fetch('/api/proxy', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 4000,
      messages: [{ role: 'user', content: prompt }]
    })
  });

  if (!res.ok) throw new Error('API 오류: ' + res.status);
  const data = await res.json();
  const text = data.content.map(c => c.text || '').join('');

function setLang(l) {
  document.getElementById('qs-ko').style.display = l==='ko'?'block':'none';
  document.getElementById('qs-en').style.display = l==='en'?'block':'none';
  document.getElementById('btn-ko').classList.toggle('active', l==='ko');
  document.getElementById('btn-en').classList.toggle('active', l==='en');
}

function selTF(btn, v, lang, i) {
  btn.parentElement.querySelectorAll('.tfb').forEach(b => b.className='tfb');
  btn.classList.add('sel-'+v);
  SEL[lang][i] = v;
}

function chkTF(lang) {
  const ans = window._tfAns?.[lang] || [];
  let score = 0;
  document.getElementById('tf-'+lang).querySelectorAll('.tfi').forEach((item,i) => {
    item.querySelectorAll('.tfb').forEach(b => {
      const bv = b.textContent.trim();
      b.className = 'tfb';
      if (bv === ans[i]) b.classList.add('ok');
      if (SEL[lang][i] === bv && bv !== ans[i]) b.classList.add('no');
    });
    if (SEL[lang][i] === ans[i]) score++;
  });
  const bd = document.getElementById('sc-'+lang);
  bd.style.display = 'inline-block';
  bd.textContent = score+'/10';
  bd.style.background = score>=8?'#eaf5ee':score>=5?'#fff8e1':'#fdecea';
}
